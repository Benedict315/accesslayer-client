name: Maintainer task
description: Create a scoped contributor task for the Access Layer client.
title: '[Task]: '
labels:
   - help wanted
body:
   - type: dropdown
     id: section
     attributes:
        label: Section
        options:
           - Foundations and developer experience
           - Marketplace and creator experience
           - Stellar wallet and transaction integration
     validations:
        required: true
   - type: input
     id: outcome
     attributes:
        label: Desired outcome
        description: One sentence describing what should be true when the issue is complete.
     validations:
        required: true
   - type: textarea
     id: scope
     attributes:
        label: Scope
        description: Describe the code area, constraints, and non-goals.
     validations:
        required: true
   - type: textarea
     id: acceptance
     attributes:
        label: Acceptance criteria
        placeholder: |
           - ...
           - ...
           - ...
     validations:
        required: true
   - type: dropdown
     id: difficulty
     attributes:
        label: Difficulty
        options:
           - good first issue
           - intermediate
           - advanced
     validations:
        required: true
